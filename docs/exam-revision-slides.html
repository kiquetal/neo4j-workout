<h1 id="neo4j-certified-professional--revision-slides">Neo4j Certified Professional — Revision Slides</h1>
<blockquote>
<p>80 questions · 60 minutes · 80% to pass<br />
Navigate slide by slide to refresh each topic before the exam.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h2 id="topic-1-neo4j-graph-platform">TOPIC 1: Neo4j Graph Platform</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<h3 id="slide-11--core-components">Slide 1.1 — Core Components</h3>
<ul>
<li><strong>Neo4j DBMS</strong>: Graph database engine (Community &amp; Enterprise editions)</li>
<li><strong>Cypher</strong>: Declarative query language (GQL-based)</li>
<li><strong>Neo4j Browser</strong>: Web UI at port 7474 for running Cypher queries</li>
<li><strong>Neo4j Bloom</strong>: Business-friendly visual graph exploration (no Cypher needed)</li>
<li><strong>Neo4j AuraDB</strong>: Fully managed cloud database (DBaaS)</li>
<li><strong>Neo4j Desktop</strong>: Local development environment, manages multiple DBs</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="en-US">
<h3 id="slide-12--architecture">Slide 1.2 — Architecture</h3>
<ul>
<li><strong>Bolt Protocol</strong>: Binary protocol for client-driver communication (port 7687)</li>
<li><strong>Causal Clustering</strong>: Leader/follower replication for Enterprise HA
<ul>
<li>Leader handles writes, followers handle reads</li>
<li>Causal consistency via bookmarks</li>
</ul>
</li>
<li><strong>Embedded vs Server mode</strong>: Embedded runs in-process (Java only), Server runs standalone</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h3 id="slide-13--tools--ecosystem">Slide 1.3 — Tools &amp; Ecosystem</h3>
<ul>
<li><strong>APOC</strong>: Standard library of 450+ procedures/functions</li>
<li><strong>Graph Data Science (GDS)</strong>: Library for graph algorithms (PageRank, community detection, etc.)</li>
<li><strong>neo4j-admin</strong>: CLI tool for backup, restore, import, migration</li>
<li><strong>Neo4j Ops Manager (NOM)</strong>: Monitoring &amp; management for Enterprise</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h3 id="slide-14--key-ports--protocols">Slide 1.4 — Key Ports &amp; Protocols</h3>
<table>
<thead>
<tr>
<th>Port</th>
<th>Protocol</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td>7474</td>
<td>HTTP</td>
<td>Browser UI &amp; REST API</td>
</tr>
<tr>
<td>7473</td>
<td>HTTPS</td>
<td>Secure Browser/REST</td>
</tr>
<tr>
<td>7687</td>
<td>Bolt</td>
<td>Driver connections</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="topic-2-graph-database-concepts">TOPIC 2: Graph Database Concepts</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h3 id="slide-21--building-blocks">Slide 2.1 — Building Blocks</h3>
<ul>
<li><strong>Nodes</strong>: Entities (circles). Have zero or more labels.</li>
<li><strong>Relationships</strong>: Connections between nodes. Always have a type and direction.</li>
<li><strong>Properties</strong>: Key-value pairs on nodes or relationships.</li>
<li><strong>Labels</strong>: Tags on nodes for grouping (e.g., <code>:Person</code>, <code>:Movie</code>).</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>(:Person {name: 'Tom'})-[:ACTED_IN {roles: ['Forrest']}]-&gt;(:Movie {title: 'Forrest Gump'})
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h3 id="slide-22--acid-compliance">Slide 2.2 — ACID Compliance</h3>
<p>Neo4j is fully ACID-compliant:</p>
<ul>
<li><strong>Atomicity</strong>: Transactions are all-or-nothing</li>
<li><strong>Consistency</strong>: DB moves from one valid state to another</li>
<li><strong>Isolation</strong>: Concurrent transactions don't interfere</li>
<li><strong>Durability</strong>: Committed data survives crashes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h3 id="slide-23--traversal--index-free-adjacency">Slide 2.3 — Traversal &amp; Index-Free Adjacency</h3>
<ul>
<li>Neo4j uses <strong>index-free adjacency</strong>: each node directly references its neighbors</li>
<li>Traversal cost is proportional to the subgraph touched, NOT the total graph size</li>
<li>This is what makes graph DBs fast for connected queries vs. JOINs in RDBMS</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h3 id="slide-24--graph-vs-relational">Slide 2.4 — Graph vs Relational</h3>
<table>
<thead>
<tr>
<th>Concept</th>
<th>Relational</th>
<th>Graph</th>
</tr>
</thead>
<tbody>
<tr>
<td>Entity</td>
<td>Row in table</td>
<td>Node</td>
</tr>
<tr>
<td>Relationship</td>
<td>Foreign key + JOIN</td>
<td>First-class relationship</td>
</tr>
<tr>
<td>Schema</td>
<td>Fixed columns</td>
<td>Flexible properties</td>
</tr>
<tr>
<td>Traversal</td>
<td>Expensive JOINs</td>
<td>Cheap pointer chasing</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<h2 id="topic-3-cypher-query-language">TOPIC 3: Cypher Query Language</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h3 id="slide-31--reading-data">Slide 3.1 — Reading Data</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Basic pattern match
MATCH (p:Person)-[:ACTED_IN]-&gt;(m:Movie)
WHERE p.name = 'Tom Hanks'
RETURN m.title, m.released

// Optional match (returns null if no match)
OPTIONAL MATCH (m)&lt;-[:DIRECTED]-(d:Person)
RETURN m.title, d.name
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="en-US">
<h3 id="slide-32--writing-data">Slide 3.2 — Writing Data</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// CREATE — always creates new
CREATE (p:Person {name: 'Alice'})

// MERGE — find or create (idempotent)
MERGE (p:Person {name: 'Alice'})
ON CREATE SET p.created = timestamp()
ON MATCH SET p.lastSeen = timestamp()

// SET — update properties
MATCH (p:Person {name: 'Alice'})
SET p.age = 30, p:Employee

// REMOVE — remove properties/labels
MATCH (p:Person {name: 'Alice'})
REMOVE p.age, p:Employee
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="en-US">
<h3 id="slide-33--delete-vs-detach-delete">Slide 3.3 — DELETE vs DETACH DELETE</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Delete a relationship
MATCH (a)-[r:KNOWS]-&gt;(b)
DELETE r

// Delete a node (must have no relationships!)
MATCH (n:Orphan)
DELETE n

// Delete node + all its relationships
MATCH (p:Person {name: 'Alice'})
DETACH DELETE p
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> You CANNOT delete a node that still has relationships — use <code>DETACH DELETE</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="en-US">
<h3 id="slide-34--aggregations">Slide 3.4 — Aggregations</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// count(*) = rows/paths, count(DISTINCT x) = unique values
MATCH (a:Person)-[:ACTED_IN]-&gt;(m:Movie)
RETURN a.name, count(DISTINCT m) AS movies

// collect() — aggregate into a list
RETURN a.name, collect(m.title) AS filmography

// Math aggregations
RETURN avg(m.imdbRating), min(m.released), max(m.revenue)
</code></pre>
<p>Grouping is implicit: non-aggregated columns become the GROUP BY.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="en-US">
<h3 id="slide-35--with-clause-piping">Slide 3.5 — WITH Clause (Piping)</h3>
<p><code>WITH</code> passes results between query parts. Variables not listed are dropped.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">MATCH (p:Person)-[:ACTED_IN]-&gt;(m:Movie)
WITH p, count(m) AS movieCount
WHERE movieCount &gt; 5
RETURN p.name, movieCount
ORDER BY movieCount DESC
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="en-US">
<h3 id="slide-36--unwind">Slide 3.6 — UNWIND</h3>
<p>Turns a list into rows (opposite of <code>collect()</code>).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Iterate over a list
WITH ['The Matrix', 'Top Gun'] AS titles
UNWIND titles AS title
MATCH (m:Movie {title: title})
RETURN m.title, m.released

// Deduplicate a list
WITH ['A', 'B', 'A'] AS items
UNWIND items AS item
WITH DISTINCT item
RETURN collect(item) AS unique
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="en-US">
<h3 id="slide-37--union--subqueries">Slide 3.7 — UNION &amp; Subqueries</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// UNION ALL (keeps duplicates, faster)
MATCH (a)-[:ACTED_IN]-&gt;(m) RETURN a.name AS name, 'Actor' AS role
UNION ALL
MATCH (d)-[:DIRECTED]-&gt;(m) RETURN d.name AS name, 'Director' AS role

// UNION ALL (keeps duplicates, faster)
MATCH (a)-[:ACTED_IN]-&gt;(m) RETURN a.name AS name, 'Actor' AS role
UNION ALL
MATCH (d)-[:DIRECTED]-&gt;(m) RETURN d.name AS name, 'Director' AS role

// CALL {} subquery — isolates scope and enables variable passing
// The scope inside CALL {} is isolated. Variables from the outer query are NOT
// automatically available within the CALL {} block.

// To pass variables INTO a CALL {} subquery:
// Use a 'WITH' clause BEFORE the CALL {} block to explicitly pass variables.
WITH 'Tom Hanks' AS actorName // actorName is from the outer scope
CALL {
  // 'actorName' is now explicitly available inside this subquery
  MATCH (p:Person {name: actorName})-[:ACTED_IN]-&gt;(m:Movie)
  RETURN m.title AS movieTitle
}
RETURN movieTitle

// To retrieve results OUT OF a CALL {} subquery:
// Use 'RETURN' inside the subquery, and its results become available
// to the outer query as if it were a subquery producing rows.

// For calling PROCEDURES (e.g., APOC procedures) within a query:
// Procedures have their own argument passing rules and use 'YIELD'
// to declare which results from the procedure should be brought into
// the main query's scope.
// Variables passed to procedures via their parameter map are accessed
// within the procedure's own query string (if it runs Cypher).

// Example with a procedure (apoc.cypher.run):
// The 'name' parameter is passed via the map {name: 'Tom Hanks'}
// and accessed as $name within the 'apoc.cypher.run' query string.
CALL apoc.cypher.run(
    &quot;MATCH (n:Person) WHERE n.name = $name RETURN n.born AS born&quot;,
    {name: 'Tom Hanks'} // Parameters for the procedure's internal query
) YIELD born // 'born' is yielded from the procedure into the main query scope
RETURN born
</code></pre>
<p>Rules: UNION queries must return same column names. Use <code>CALL {}</code> to post-process UNION results.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="en-US">
<h3 id="slide-38--string-filtering">Slide 3.8 — String Filtering</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Case-sensitive
WHERE m.title STARTS WITH 'The'
WHERE m.title CONTAINS 'Matrix'
WHERE m.title ENDS WITH 'Returns'

// Case-insensitive
WHERE toLower(m.title) CONTAINS 'matrix'

// Inside a list property
WHERE ANY(c IN m.countries WHERE toLower(c) = 'germany')
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="en-US">
<h3 id="slide-39--case-expression">Slide 3.9 — CASE Expression</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">RETURN m.title,
  CASE
    WHEN m.imdbRating &gt; 8.5 THEN 'Masterpiece'
    WHEN m.imdbRating &gt; 7.0 THEN 'Good'
    ELSE 'Average'
  END AS tier
</code></pre>
<p>No <code>IF</code> keyword in Cypher — use <code>CASE</code> for conditional logic.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="en-US">
<h3 id="slide-310--parameters-best-practice">Slide 3.10 — Parameters (Best Practice)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Always parameterize — never hardcode values
MATCH (p:Person {name: $actorName})-[:ACTED_IN]-&gt;(m)
RETURN m.title
</code></pre>
<p>Why: execution plan caching, Cypher injection prevention, cleaner code.</p>
<p>In Neo4j Browser: <code>:param actorName =&gt; 'Tom Hanks'</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="en-US">
<h3 id="slide-311--map-projections--pattern-comprehension">Slide 3.11 — Map Projections &amp; Pattern Comprehension</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Map projection — custom JSON shape
MATCH (p:Person)-[:ACTED_IN]-&gt;(m:Movie)
RETURN p { .name, movies: collect(m.title) }

// Pattern comprehension — inline list from pattern
MATCH (p:Person)
RETURN p.name, [(p)-[:DIRECTED]-&gt;(m) | m.title] AS directed
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="en-US">
<h3 id="slide-312--dates--durations">Slide 3.12 — Dates &amp; Durations</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">RETURN date()                          // today
RETURN date('2023-10-25')              // from string
RETURN date().year                     // extract component
RETURN date() + duration({months: 2})  // date math
RETURN duration.between(d1, d2).years  // difference
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="en-US">
<h3 id="slide-313--useful-functions">Slide 3.13 — Useful Functions</h3>

<tr>
<th>Function</th>
<th>Purpose</th>
</tr>
</thead>

</tr>
<tr>

</tr>

</tr>
<tr>

</tr>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="en-US">
<h2 id="topic-4-graph-data-modeling">TOPIC 4: Graph Data Modeling</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="en-US">
<h3 id="slide-41--design-principles">Slide 4.1 — Design Principles</h3>
<ol>
<li>Model around your <strong>queries</strong> (use cases first, model second)</li>
<li>Nodes for <strong>nouns</strong> (entities with identity)</li>
<li>Relationships for <strong>verbs</strong> (actions, connections)</li>
<li>Properties for <strong>attributes</strong> (simple values)</li>
<li>Labels for <strong>roles/categories</strong></li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="en-US">
<h3 id="slide-42--when-to-use-what">Slide 4.2 — When to Use What</h3>
<table>
<thead>
<tr>
<th>Use a Node when...</th>
<th>Use a Relationship when...</th>
<th>Use a Property when...</th>
</tr>
</thead>
<tbody>
<tr>
<td>It has its own identity</td>
<td>It connects two entities</td>
<td>It's a simple attribute</td>
</tr>
<tr>
<td>Other things connect to it</td>
<td>It represents an action/verb</td>
<td>You don't query by it often</td>
</tr>
<tr>
<td>It needs multiple relationships</td>
<td>Direction matters</td>
<td>It's a primitive value</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="en-US">
<h3 id="slide-43--reification-relationship-%E2%86%92-node">Slide 4.3 — Reification (Relationship → Node)</h3>
<p>Turn a relationship into an intermediate node when:</p>
<ul>
<li>The connection needs its own properties</li>
<li>Other nodes need to connect to the connection</li>
<li>You need a history of events</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>BEFORE: (:User)-[:RATED {score: 5}]-&gt;(:Movie)

AFTER:  (:User)-[:WROTE]-&gt;(:Review {score: 5, text: '...'})-[:REVIEWS]-&gt;(:Movie)
                                      ^
                              (:User)-[:LIKED]
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="en-US">
<h3 id="slide-44--common-anti-patterns">Slide 4.4 — Common Anti-Patterns</h3>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Storing connected data as comma-separated strings in properties</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Using generic relationship types like <code>:RELATES_TO</code></li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Creating &quot;god nodes&quot; connected to millions of other nodes</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> Modeling everything as nodes when a property would suffice</li>
<li><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Use specific relationship types: <code>:ACTED_IN</code>, <code>:DIRECTED</code>, <code>:RATED</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h3 id="slide-45--refactoring-patterns">Slide 4.5 — Refactoring Patterns</h3>
<ul>
<li><strong>Extract node from property</strong>: Turn <code>m.genre = 'Sci-Fi'</code> into <code>(m)-[:IN_GENRE]-&gt;(g:Genre {name: 'Sci-Fi'})</code></li>
<li><strong>Qualify relationships</strong>: Split <code>:ACTED_IN</code> into <code>:ACTED_IN_2023</code>, <code>:ACTED_IN_2024</code> for time-based filtering</li>
<li><strong>Merge duplicate nodes</strong>: Use <code>MERGE</code> + unique constraints to deduplicate</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<h2 id="topic-5-importing-data">TOPIC 5: Importing Data</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="en-US">
<h3 id="slide-51--import-methods-overview">Slide 5.1 — Import Methods Overview</h3>
<table>
<thead>
<tr>
<th>Method</th>
<th>Best For</th>
<th>Speed</th>
<th>Notes</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>LOAD CSV</code></td>
<td>Small-medium CSV files</td>
<td>Medium</td>
<td>Runs as Cypher, transactional</td>
</tr>
<tr>
<td><code>neo4j-admin import</code></td>
<td>Initial bulk load</td>
<td>Fastest</td>
<td>DB must be empty/offline</td>
</tr>
<tr>
<td>APOC procedures</td>
<td>JSON, JDBC, XML, APIs</td>
<td>Varies</td>
<td>Flexible, many formats</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="en-US">
<h3 id="slide-52--load-csv">Slide 5.2 — LOAD CSV</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// With headers
LOAD CSV WITH HEADERS FROM 'file:///movies.csv' AS row
MERGE (m:Movie {id: toInteger(row.movieId)})
SET m.title = row.title, m.year = toInteger(row.year)

// Without headers (access by index)
LOAD CSV FROM 'file:///data.csv' AS row
RETURN row[0], row[1]
</code></pre>
<p>Key points:</p>
<ul>
<li>All values come in as <strong>strings</strong> — cast with <code>toInteger()</code>, <code>toFloat()</code>, etc.</li>
<li>Use <code>MERGE</code> (not <code>CREATE</code>) to avoid duplicates</li>
<li>Create constraints BEFORE importing for performance</li>
<li>Use <code>USING PERIODIC COMMIT 1000</code> for large files (pre-5.x) or <code>CALL {} IN TRANSACTIONS</code> (5.x)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="en-US">
<h3 id="slide-53--neo4j-admin-import">Slide 5.3 — neo4j-admin import</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">neo4j-admin database import full \
  --nodes=Person=persons.csv \
  --nodes=Movie=movies.csv \
  --relationships=ACTED_IN=acted_in.csv \
  neo4j
</code></pre>
<ul>
<li>Requires specific CSV header format (<code>:ID</code>, <code>:LABEL</code>, <code>:TYPE</code>, <code>:START_ID</code>, <code>:END_ID</code>)</li>
<li>Database must be <strong>stopped</strong> or <strong>empty</strong></li>
<li>Fastest method — bypasses transaction layer</li>
<li>No Cypher — purely structural</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" lang="en-US">
<h3 id="slide-54--apoc-import">Slide 5.4 — APOC Import</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// JSON import
CALL apoc.load.json('https://api.example.com/data') YIELD value
MERGE (p:Person {id: value.id})
SET p.name = value.name

// JDBC (relational DB)
CALL apoc.load.jdbc('jdbc:mysql://...', 'SELECT * FROM users') YIELD row
MERGE (u:User {id: row.id})
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="en-US">
<h3 id="slide-55--import-best-practices">Slide 5.5 — Import Best Practices</h3>
<ol>
<li><strong>Create uniqueness constraints first</strong> — speeds up MERGE lookups</li>
<li><strong>Import nodes before relationships</strong></li>
<li><strong>Batch large imports</strong> with <code>CALL {} IN TRANSACTIONS OF 1000 ROWS</code></li>
<li><strong>Cast data types</strong> — CSV values are always strings</li>
<li><strong>Handle nulls</strong> — use <code>CASE</code> or <code>coalesce()</code> for missing values</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" lang="en-US">
<h2 id="topic-6-indexes--constraints">TOPIC 6: Indexes &amp; Constraints</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="en-US">
<h3 id="slide-61--constraint-types">Slide 6.1 — Constraint Types</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Uniqueness constraint (also creates an index)
CREATE CONSTRAINT person_name_unique
FOR (p:Person) REQUIRE p.name IS UNIQUE

// Node property existence (Enterprise only)
CREATE CONSTRAINT person_name_exists
FOR (p:Person) REQUIRE p.name IS NOT NULL

// Relationship property existence (Enterprise only)
CREATE CONSTRAINT acted_in_roles_exists
FOR ()-[r:ACTED_IN]-() REQUIRE r.roles IS NOT NULL

// Node key (unique + exists, Enterprise only)
CREATE CONSTRAINT person_key
FOR (p:Person) REQUIRE (p.name, p.born) IS NODE KEY
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="en-US">
<h3 id="slide-62--index-types">Slide 6.2 — Index Types</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// Range index (default, general purpose)
CREATE INDEX person_name_idx FOR (p:Person) ON (p.name)

// Composite index (multiple properties)
CREATE INDEX movie_composite FOR (m:Movie) ON (m.title, m.year)

// Text index (optimized for string CONTAINS/ENDS WITH)
CREATE TEXT INDEX person_name_text FOR (p:Person) ON (p.name)

// Full-text index (Lucene-based, supports fuzzy search)
CREATE FULLTEXT INDEX movie_search
FOR (m:Movie) ON EACH [m.title, m.plot]

// Point index (spatial queries)
CREATE POINT INDEX location_idx FOR (p:Place) ON (p.location)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" lang="en-US">
<h3 id="slide-63--when-indexes-are-used">Slide 6.3 — When Indexes Are Used</h3>
<table>
<thead>
<tr>
<th>Query Pattern</th>
<th>Index Type Used</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>WHERE n.prop = value</code></td>
<td>Range index</td>
</tr>
<tr>
<td><code>WHERE n.prop &gt; value</code></td>
<td>Range index</td>
</tr>
<tr>
<td><code>WHERE n.prop STARTS WITH 'x'</code></td>
<td>Range index</td>
</tr>
<tr>
<td><code>WHERE n.prop CONTAINS 'x'</code></td>
<td>Text index</td>
</tr>
<tr>
<td><code>WHERE n.prop ENDS WITH 'x'</code></td>
<td>Text index</td>
</tr>
<tr>
<td>Full-text search</td>
<td>Full-text index</td>
</tr>
<tr>
<td><code>MERGE (n:Label {prop: val})</code></td>
<td>Uniqueness constraint's index</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" lang="en-US">
<h3 id="slide-64--managing-indexes--constraints">Slide 6.4 — Managing Indexes &amp; Constraints</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// List all
SHOW INDEXES
SHOW CONSTRAINTS

// Drop
DROP INDEX index_name
DROP CONSTRAINT constraint_name
</code></pre>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> A uniqueness constraint automatically creates a range index — no need to create both.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" lang="en-US">
<h3 id="slide-65--explain--profile">Slide 6.5 — EXPLAIN &amp; PROFILE</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cypher">// EXPLAIN — shows query plan WITHOUT executing
EXPLAIN MATCH (p:Person {name: 'Tom'}) RETURN p

// PROFILE — executes and shows actual rows/db hits
PROFILE MATCH (p:Person {name: 'Tom'}) RETURN p
</code></pre>
<p>Look for:</p>
<ul>
<li><strong>NodeIndexSeek</strong> <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> (good — using an index)</li>
<li><strong>AllNodesScan</strong> <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> (bad — scanning everything)</li>
<li><strong>db hits</strong> — lower is better</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" lang="en-US">
<h2 id="topic-7-drivers--application-development">TOPIC 7: Drivers &amp; Application Development</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" lang="en-US">
<h3 id="slide-71--driver-architecture">Slide 7.1 — Driver Architecture</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Application → Driver → Bolt Protocol → Neo4j Server
</code></pre>
<ul>
<li>Drivers are <strong>official</strong> for Java, Python, JavaScript, .NET, Go</li>
<li>Connection via <strong>Bolt URI</strong>: <code>bolt://</code>, <code>neo4j://</code> (routing), <code>bolt+s://</code> (encrypted)</li>
<li><code>neo4j://</code> enables <strong>routing</strong> for clusters (recommended for production)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" lang="en-US">
<h3 id="slide-72--java-driver-basics">Slide 7.2 — Java Driver Basics</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-java"><span class="hljs-type">var</span> <span class="hljs-variable">driver</span> <span class="hljs-operator">=</span> GraphDatabase.driver(
    <span class="hljs-string">&quot;bolt://localhost:7687&quot;</span>,
    AuthTokens.basic(<span class="hljs-string">&quot;neo4j&quot;</span>, <span class="hljs-string">&quot;password&quot;</span>)
);

<span class="hljs-keyword">try</span> (<span class="hljs-type">var</span> <span class="hljs-variable">session</span> <span class="hljs-operator">=</span> driver.session()) {
    <span class="hljs-type">var</span> <span class="hljs-variable">result</span> <span class="hljs-operator">=</span> session.run(
        <span class="hljs-string">&quot;MATCH (p:Person {name: $name}) RETURN p.name&quot;</span>,
        Map.of(<span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;Tom Hanks&quot;</span>)
    );
    <span class="hljs-keyword">while</span> (result.hasNext()) {
        System.out.println(result.next().get(<span class="hljs-string">&quot;p.name&quot;</span>).asString());
    }
}

driver.close();
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" lang="en-US">
<h3 id="slide-73--sessions--transactions">Slide 7.3 — Sessions &amp; Transactions</h3>
<table>
<thead>
<tr>
<th>Concept</th>
<th>Description</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Driver</strong></td>
<td>Thread-safe, one per app, manages connection pool</td>
</tr>
<tr>
<td><strong>Session</strong></td>
<td>Lightweight, not thread-safe, borrows connections</td>
</tr>
<tr>
<td><strong>Auto-commit tx</strong></td>
<td><code>session.run()</code> — single query, auto-committed</td>
</tr>
<tr>
<td><strong>Managed tx</strong></td>
<td><code>session.executeRead/Write()</code> — retried on transient errors</td>
</tr>
<tr>
<td><strong>Unmanaged tx</strong></td>
<td><code>session.beginTransaction()</code> — manual commit/rollback</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" lang="en-US">
<h3 id="slide-74--managed-transactions-recommended">Slide 7.4 — Managed Transactions (Recommended)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-java"><span class="hljs-comment">// Read transaction (routed to followers in a cluster)</span>
<span class="hljs-type">var</span> <span class="hljs-variable">name</span> <span class="hljs-operator">=</span> session.executeRead(tx -&gt; {
    <span class="hljs-type">var</span> <span class="hljs-variable">result</span> <span class="hljs-operator">=</span> tx.run(<span class="hljs-string">&quot;MATCH (p:Person {name: $name}) RETURN p&quot;</span>,
                        Map.of(<span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;Tom Hanks&quot;</span>));
    <span class="hljs-keyword">return</span> result.single().get(<span class="hljs-string">&quot;p&quot;</span>).asNode().get(<span class="hljs-string">&quot;name&quot;</span>).asString();
});

<span class="hljs-comment">// Write transaction (routed to leader)</span>
session.executeWrite(tx -&gt; {
    tx.run(<span class="hljs-string">&quot;MERGE (p:Person {name: $name})&quot;</span>, Map.of(<span class="hljs-string">&quot;name&quot;</span>, <span class="hljs-string">&quot;Alice&quot;</span>));
    <span class="hljs-keyword">return</span> <span class="hljs-literal">null</span>;
});
</code></pre>
<ul>
<li>Automatically retried on transient errors (deadlocks, leader changes)</li>
<li>Use <code>executeRead</code> for reads, <code>executeWrite</code> for writes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" lang="en-US">
<h3 id="slide-75--connection-uris">Slide 7.5 — Connection URIs</h3>
<table>
<thead>
<tr>
<th>URI Scheme</th>
<th>Encryption</th>
<th>Routing</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>bolt://</code></td>
<td>No</td>
<td>No (single server)</td>
</tr>
<tr>
<td><code>bolt+s://</code></td>
<td>Yes (TLS)</td>
<td>No</td>
</tr>
<tr>
<td><code>bolt+ssc://</code></td>
<td>Yes (self-signed)</td>
<td>No</td>
</tr>
<tr>
<td><code>neo4j://</code></td>
<td>No</td>
<td>Yes (cluster)</td>
</tr>
<tr>
<td><code>neo4j+s://</code></td>
<td>Yes (TLS)</td>
<td>Yes</td>
</tr>
<tr>
<td><code>neo4j+ssc://</code></td>
<td>Yes (self-signed)</td>
<td>Yes</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" lang="en-US">
<h3 id="slide-76--error-handling">Slide 7.6 — Error Handling</h3>
<ul>
<li><strong>Transient errors</strong> (e.g., <code>Neo.TransientError.*</code>): Retry automatically with managed transactions</li>
<li><strong>Client errors</strong> (e.g., <code>Neo.ClientError.Statement.SyntaxError</code>): Fix the query</li>
<li><strong>Database errors</strong>: Check server logs</li>
<li>Always <strong>close</strong> drivers and sessions (use try-with-resources in Java)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" lang="en-US">
<h3 id="slide-77--bookmarks-causal-consistency">Slide 7.7 — Bookmarks (Causal Consistency)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-java"><span class="hljs-comment">// Session 1 writes data</span>
Bookmark bookmark;
<span class="hljs-keyword">try</span> (<span class="hljs-type">var</span> <span class="hljs-variable">s1</span> <span class="hljs-operator">=</span> driver.session()) {
    s1.executeWrite(tx -&gt; tx.run(<span class="hljs-string">&quot;CREATE (:Person {name: &#x27;New&#x27;})&quot;</span>));
    bookmark = s1.lastBookmark();
}

<span class="hljs-comment">// Session 2 reads with bookmark — guaranteed to see the write</span>
<span class="hljs-keyword">try</span> (<span class="hljs-type">var</span> <span class="hljs-variable">s2</span> <span class="hljs-operator">=</span> driver.session(SessionConfig.builder()
        .withBookmarks(bookmark).build())) {
    s2.executeRead(tx -&gt; tx.run(<span class="hljs-string">&quot;MATCH (p:Person {name: &#x27;New&#x27;}) RETURN p&quot;</span>));
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" lang="en-US">

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" lang="en-US">
<h3 id="must-know-cypher-clauses">Must-Know Cypher Clauses</h3>
<table>
<thead>
<tr>
<th>Clause</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>MATCH</code></td>
<td>Find patterns</td>
</tr>
<tr>
<td><code>WHERE</code></td>
<td>Filter results</td>
</tr>
<tr>
<td><code>RETURN</code></td>
<td>Output results</td>
</tr>
<tr>
<td><code>CREATE</code></td>
<td>Create nodes/relationships</td>
</tr>
<tr>
<td><code>MERGE</code></td>
<td>Find or create (idempotent)</td>
</tr>
<tr>
<td><code>SET</code></td>
<td>Update properties, add labels</td>
</tr>
<tr>
<td><code>REMOVE</code></td>
<td>Remove properties/labels</td>
</tr>
<tr>
<td><code>DELETE</code></td>
<td>Delete nodes/relationships</td>
</tr>
<tr>
<td><code>DETACH DELETE</code></td>
<td>Delete node + all its relationships</td>
</tr>
<tr>
<td><code>WITH</code></td>
<td>Pipe results between query parts</td>
</tr>
<tr>
<td><code>UNWIND</code></td>
<td>List → rows</td>
</tr>
<tr>
<td><code>ORDER BY</code></td>
<td>Sort results</td>
</tr>
<tr>
<td><code>LIMIT</code> / <code>SKIP</code></td>
<td>Pagination</td>
</tr>
<tr>
<td><code>CALL {}</code></td>
<td>Subquery</td>
</tr>
<tr>
<td><code>UNION</code> / <code>UNION ALL</code></td>
<td>Combine query results</td>
</tr>
<tr>
<td><code>FOREACH</code></td>
<td>Iterate and mutate</td>
</tr>
<tr>
<td><code>LOAD CSV</code></td>
<td>Import CSV data</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" lang="en-US">

<thead>
<tr>
<th>Function</th>
<th>Returns</th>

</thead>
<tbody>
<tr>
<td><code>count()</code></td>
<td>Number of rows</td>
</tr>
<tr>
<td><code>collect()</code></td>
<td>Aggregated list</td>
</tr>
<tr>
<td><code>avg()</code>, <code>sum()</code>, <code>min()</code>, <code>max()</code></td>
<td>Math aggregations</td>
</tr>
<tr>
<td><code>size()</code></td>
<td>List length</td>
</tr>
<tr>
<td><code>length()</code></td>
<td>Path length</td>
</tr>
<tr>
<td><code>type(r)</code></td>

</tr>

</tr>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" lang="en-US">
<h3 id="common-exam-traps-%E2%9A%A0%EF%B8%8F">Common Exam Traps <img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/></h3>
<ol>
<li><code>DELETE</code> on a node with relationships → <strong>ERROR</strong>. Use <code>DETACH DELETE</code>.</li>
<li><code>MERGE</code> on a full pattern creates the ENTIRE pattern if not found — not just missing parts.</li>
<li><code>LOAD CSV</code> values are always <strong>strings</strong> — must cast explicitly.</li>
<li><code>count(*)</code> counts paths/rows, <code>count(DISTINCT n)</code> counts unique nodes.</li>
<li><code>UNION</code> requires identical column names in all queries.</li>
<li>Uniqueness constraint = automatic index. Don't create a separate one.</li>
<li><code>neo4j://</code> = routing (cluster), <code>bolt://</code> = single server.</li>
<li><code>executeRead()</code> routes to followers, <code>executeWrite()</code> routes to leader.</li>
<li><code>REMOVE</code> removes properties/labels. <code>DELETE</code> removes nodes/relationships.</li>
<li><code>ON CREATE SET</code> / <code>ON MATCH SET</code> only work with <code>MERGE</code>.</li>
</ol>
</section>
